    <main class="contact-me">
        <h1 id="contact" class="typewriter"></h1>
        <div style="display: flex; flex-direction: row; justify-content: space-evenly; align-items: flex-start;">
            <div>
                <p>Email:<a href="mailto:2713017@dundee.ac.uk">2713017@dundee.ac.uk</a></p>
                <p>Phone:<a href="tel:+447826623341">+44 7782 662 3341</a></p>
            </div>
            <div class="fade-in">
                <form class="flex-container contact-form" action="mailto:2713017@dundee.ac.uk" method="post" enctype="text/plain">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <button type="submit">Send</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="contact-info">
            <p>
                <i class="fa-solid fa-envelope"></i>
                <a href="mailto:2713017@dundee.ac.uk">2713017@dundee.ac.uk</a>
